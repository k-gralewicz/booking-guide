<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Update Shop' : 'Create Shop'">Shop Form</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments/navbar :: navigation}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 border rounded p-4 bg-light shadow-sm">

                <h3 class="text-center" th:text="${isEdit} ? 'Update Shop' : 'Create Shop'">Shop Form</h3>
                <hr/>

                <form th:action="${isEdit} ? @{/shops/update/{id}(id=${shop.id})} : @{/shops}"
                      th:object="${shop}"
                      method="post">

                    <input type="hidden" th:if="${isEdit}" th:field="*{id}"/>

                    <div class="row">
                        <div class="col-md-6">
                            <h5 class="text-secondary mb-3">Shop Information</h5>
                            <div class="mb-3">
                                <label for="name" class="fw-bold">Shop Name:</label>
                                <input type="text" id="name" th:field="*{name}" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label for="description" class="fw-bold">Description:</label>
                                <input type="text" id="description" th:field="*{description}" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label for="phoneNumber" class="fw-bold">Phone Number:</label>
                                <input type="text" id="phoneNumber" th:field="*{phoneNumber}" class="form-control" required/>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <h5 class="text-secondary mb-3">Location</h5>
                            <div class="mb-3">
                                <label for="address.street" class="fw-bold">Street:</label>
                                <input type="text" id="address.street" th:field="*{address.street}" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label for="address.flatNumber" class="fw-bold">Number/Flat:</label>
                                <input type="text" id="address.flatNumber" th:field="*{address.flatNumber}" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label for="address.postCode" class="fw-bold">Post Code:</label>
                                <input type="text" id="address.postCode" th:field="*{address.postCode}" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label for="address.city" class="fw-bold">City:</label>
                                <input type="text" id="address.city" th:field="*{address.city}" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label for="address.country" class="fw-bold">Country:</label>
                                <input type="text" id="address.country" th:field="*{address.country}" class="form-control" required/>
                            </div>
                        </div>
                    </div>

                    <div class="text-center mt-4">
                        <div class="btn-group w-100">
                            <button type="submit" class="btn btn-primary"
                                    th:text="${isEdit} ? 'Update Shop' : 'Add Shop'">Save</button>
                            <a th:href="@{/shops}" class="btn btn-secondary ms-2">Cancel</a>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

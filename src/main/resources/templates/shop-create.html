<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <meta charset="UTF-8">
</head>
<body>
<div class="container-fluid">
    <div th:replace="fragments/navbar::navigation"></div>
    <h1 th:text="${isEdit} ? 'Update Shop' : 'Create Shop'">Create Shop</h1>
    <div class="row">
        <div class="col">
            <form th:action="${isEdit} ? @{/shops/update/{id}(id=${shop.id})} : @{/shops}" th:object="${shop}"
                  method="post">
                <!--      <input type="hidden" th:field="*{id}"/>-->
                <!--    <form action="#" th:action="@{/shops}" th:object="${shop}" method="post">-->
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" th:field="*{name}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="description">Description:</label>
                    <input type="text" id="description" th:field="*{description}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="phoneNumber">PhoneNumber:</label>
                    <input type="text" id="phoneNumber" th:field="*{phoneNumber}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="address.street">Address, Street:</label>
                    <input type="text" id="address.street" th:field="${shop.address.street}" class="form-control"
                           required/>
                </div>
                <div class="form-group">
                    <label for="address.flatNumber">Address, Flat number:</label>
                    <input type="text" id="address.flatNumber" th:field="${shop.address.flatNumber}"
                           class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="address.postCode">Address, Post Code:</label>
                    <input type="text" id="address.postCode" th:field="${shop.address.postCode}" class="form-control"
                           required/>
                </div>
                <div class="form-group">
                    <label for="address.city">Address, City:</label>
                    <input type="text" id="address.city" th:field="${shop.address.city}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="address.country">Address, Country:</label>
                    <input type="text" id="address.country" th:field="${shop.address.country}" class="form-control"
                           required/>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Update Shop' : 'Add Shop'">Add
                        Shop
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>

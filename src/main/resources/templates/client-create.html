<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <meta charset="UTF-8">
    <title>Create Clients</title>
</head>
<body>
<div class="container-fluid">
    <form th:action="${isEdit} ? @{/clients/update/{id}(id=${client.id})} : @{/clients}" th:object="${client}" method="post">
    <h1>Create Client</h1>
    <div class="row">
        <div class="col">
<!--            <form action="/clients" method="post">-->
            <form action="#" th:action="@{/clients}" th:object="${client}" method="post">
                <div class="mb-3">
                    <span>First Name:</span>
<!--                    <input id="firstName" name="firstName" class="form-control">-->
                    <input th:field="*{firstName}" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="lastName">Last Name</label>
<!--                    <input id="lastName" name="lastName" class="form-control">-->
                    <input th:field="${client.lastName}" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="email">Email</label>
                    <input id="email" name="email" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="phoneNumber">Phone Number</label>
                    <input id="phoneNumber" name="phoneNumber" class="form-control">
                </div>
                <div class="form-group">
                    <label for="address.street">Address, Street:</label>
                    <input type="text" id="address.street" th:field="${client.address.street}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="address.flatNumber">Address, Flat number:</label>
                    <input type="text" id="address.flatNumber" th:field="${client.address.flatNumber}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="address.postCode">Address, Post Code:</label>
                    <input type="text" id="address.postCode" th:field="${client.address.postCode}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="address.city">Address, City:</label>
                    <input type="text" id="address.city" th:field="${client.address.city}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="address.country">Address, Country:</label>
                    <input type="text" id="address.country" th:field="${client.address.country}" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <button type="submit" class="btn btn-primary">Create</button>
                </div>
            </form>
        </div>
        <div class="col">
            <div th:text="${createMessage}">&nbsp;</div>
        </div>
    </div>
</div>
</body>
</html>

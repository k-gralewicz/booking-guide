<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>User Dashboard</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments/navbar :: navigation}"></div>
    <div class="container-fluid">
        <h1 class="mb-4">User Dashboard</h1>
        <div class="card mb-4">
            <div class="card-header">Your Shops</div>
            <div class="card-body">
                <ul class="list-group">
                    <li class="list-group-item" th:each="shop : ${shops}"
                        th:text="${shop.name + ' - ' + shop.address}"></li>
                    <li class="list-group-item" th:if="${shops == null}">No shops assigned yet.
                    </li>
                </ul>
            </div>
        </div>
        <div class="card mb-4">
            <!--        th:if="${shops != null and !shops.isEmpty()}"-->
            <div class="card-header">Select Active Shop</div>
            <div class="card-body">
                <form th:action="@{/users/shops/select}" method="post">
                    <div class="form-group">
                        <label for="selectShop">Choose Shop:</label>
                        <select id="selectShop" name="shopId" class="form-control" required>
                            <option th:each="shop : ${shops}"
                                    th:value="${shop.id}"
                                    th:text="${shop.name + ' - ' + shop.address}"
                                    th:selected="${selectedShop != null} ? (shop.id == selectedShop.id) : false">
                            </option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary mt-2">Select Shop</button>
                </form>
            </div>
        </div>
        <div class="card">
            <div class="card-header">Assign Another Shop</div>
            <div class="card-body">
                <form th:action="@{/users/shops/assign}" method="post">
                    <div class="form-group">
                        <label for="assignShop">Available Shops:</label>
                        <select id="assignShop" name="shopId" class="form-control" required>
                            <option th:each="shop : ${unassignedShops}"
                                    th:value="${shop.id}"
                                    th:text="${shop.name + ' - ' + shop.address}">
                            </option>
                            <option th:if="${shops != null and !shops.isEmpty()}" disabled>No available shops to
                                assign
                            </option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success mt-2">Assign to Me</button>
                    <!--                th:if="${shops != null and !shops.isEmpty()}"-->
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>

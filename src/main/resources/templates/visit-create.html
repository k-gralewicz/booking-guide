<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml" xmlns:sec="http://www.w3.org/1999/xhtml">
<head>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <meta charset="UTF-8">
    <title>Create Visits</title>
</head>
<body>
<div class="container-fluid">
    <div th:if="${!isEdit}">
        <h1>Create Visit</h1>
    </div>
    <div th:if="${isEdit}">
        <h1>Edit Visit</h1>
    </div>
    <div class="row">
        <div class="col">
            <form th:action="${isEdit} ? @{/visits/update/{id}(id=${visit.id})} : @{/visits/create}"
                  method="post"
                  th:object="${visit}">
                <input type="hidden" th:if="${isEdit}" th:value="*{id}"/>
<!--                <input type="hidden" name="serviceId" th:if="${isEdit}" th:value="${visit?.service?.id}"/>-->
                <div th:if="${visit != null}">
<!--                    <div class="mb-3">-->
<!--                        <label for="firstName">Client First Name</label>-->
<!--                    </div>-->
                    <div class="mb-3">
<!--                        <label for="lastName">Client Last Name</label>-->
                        <input type="hidden" name="username" th:value="${#authentication.name}">
                        <span th:value="${#authentication.name}"></span>
<!--                        <div sec:authentication="name"></div>-->
                    </div>
                    <div sec:authorize="hasRole('ROLE_ADMIN')">
                        <div class="form-group">
                            <label for="client">Client:</label>
<!--                            <div th:text="${clients}"></div>-->
                            <select id="client" name="id" th:field="*{id}" class="form-control" required>
                                <option th:each="client : ${clients}" th:value="${client.id}" th:text="${client.firstName}"></option>
                            </select>
                        </div>                    </div>
                    <div class="mb-3">
                        <label for="serviceName">Service</label>
                        <span id="visit.service" th:text="${visit?.service}"></span>
                    </div>
                    <div class="mb-3">
                        <span>Shop: <strong th:text="${session.SHOP_SESSION.name}">Shop Name</strong></span>
                        <span>Shop: <strong th:text="${session.SHOP_SESSION.id}">Shop ID</strong></span>
                        <input type="hidden" name="shopId" th:value="${session.SHOP_SESSION.id}">
                        <input type="hidden" name="serviceId" th:value="${session.SERVICE_SESSION.id}">
                    </div>
                    <div class="mb-3">
                        <label for="dueDate">Date</label>
                        <input type="date" id="dueDate" name="dueDate" class="form-control">
                    </div>
                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary">Create</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <div class="col">
        <div th:text="${createMessage}">&nbsp;</div>
    </div>
</div>
</div>
</body>
</html>

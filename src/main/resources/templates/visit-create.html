<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Edit Visit' : 'Create Visit'">Visit Form</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments/navbar :: navigation}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 border rounded p-4 bg-light shadow-sm">

                <h3 class="text-center" th:text="${isEdit} ? 'Edit Visit' : 'Create Visit'">Visit Form</h3>
                <hr/>

                <form th:action="${isEdit} ? @{/visits/update/{id}(id=${visit.id})} : @{/visits/create}"
                      method="post"
                      th:object="${visit}">

                    <input type="hidden" th:if="${isEdit}" th:field="*{id}"/>

                    <div th:if="${visit != null}">

                        <div sec:authorize="hasRole('ROLE_ADMIN')" class="mb-4">
                            <label class="fw-bold" for="client">Client:</label>
<!--                            <select id="client" th:field="*{client.id}" class="form-select" required>-->
                            <select id="client" name="clientId" class="form-select" required>
                                <option value="" disabled selected>Select a client</option>
                                <option th:each="client : ${clients}"
                                        th:value="${client.id}"
                                        th:text="${client.firstName + ' ' + client.lastName}"></option>
                            </select>
                        </div>

                        <div sec:authorize="!hasRole('ROLE_ADMIN')">
                            <input type="hidden" name="username" th:value="${#authentication.name}">
                        </div>

                        <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                            <label class="fw-bold">Service:</label>
                            <span th:text="${session.SERVICE_SESSION?.name}">Service Name</span>
                        </div>

                        <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                            <label class="fw-bold">Shop:</label>
                            <span th:text="${session.SHOP_SESSION?.name}">Shop Name</span>
                            <input type="hidden" name="shopId" th:value="${session.SHOP_SESSION?.id}">
                            <input type="hidden" name="serviceId" th:value="${session.SERVICE_SESSION?.id}">
                        </div>

                        <div class="mb-4">
                            <label class="fw-bold" for="dueDate">Date:</label>
                            <input type="date" id="dueDate" th:field="*{dueDate}" class="form-control" required>
                            <div class="form-text">Format: YYYY-MM-DD</div>
                        </div>

                        <div class="text-center mt-4">
                            <div class="btn-group w-100">
                                <button type="submit" class="btn btn-primary"
                                        th:text="${isEdit} ? 'Update Visit' : 'Create Visit'">Action</button>
                                <a th:href="@{/clients/dashboard}" class="btn btn-secondary ms-2">Cancel</a>
                            </div>
                        </div>
                    </div>
                </form>

                <div class="mt-3 text-center">
                    <span class="text-danger fw-bold" th:text="${error}"></span>
                    <span class="text-info" th:text="${createMessage}"></span>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

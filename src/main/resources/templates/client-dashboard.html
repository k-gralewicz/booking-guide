
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Client Dashboard</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-4.0.0.slim.min.js"></script>
    <script type="text/javascript" th:src="@{/js/client-dashboard.js}"></script>
</head>
<body>
<div>
    <div th:replace="~{fragments/navbar::navigation}"></div>
    <h1>Client Dashboard</h1>
    <div>
        <form th:action="@{/clients/visit/create}" method="get" id="dashboardForm">
            <div class="form-group">
                <div th:if="${errorSelectedShopId}" th:text="${errorSelectedShopId}" class="text-danger"></div>
                <label for="shop">Select Shop</label>
                <select class="form-control" id="shop" name="selectedShopId" onchange="selectShopOrService();">
                    <option value="">--Select Shop--</option>
                    <option th:each="shop : ${shops}"
                            th:value="${shop.id}"
                            th:text="${shop.name}"
                            th:selected="${shop.id == selectedShopId}"></option>
                </select>
            </div>
            <div class="form-group">
                <div th:if="${errorSelectedServiceId}" th:text="${errorSelectedServiceId}" class="text-danger"></div>
                <label for="service">Select Service</label>
                <select class="form-control" id="service" name="selectedServiceId" onchange="selectShopOrService();">
                    <option value="">--Select Service--</option>
                    <option th:each="service : ${services}"
                            th:value="${service.id}"
                            th:text="${service.name}"
                            th:selected="${service.id == selectedServiceId}"></option>
                </select>
            </div>

            <input type="hidden" th:value="${#authentication.name}" name="username">

            <br/>
            <button type="submit" class="btn btn-primary"
                    th:disabled="${selectedShopId == null || selectedServiceId == null}">
                Book a new visit
            </button>
        </form>
        <br/>
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Client</th>
                <th>Service</th>
                <th>Shop</th>
                <th>Due Date</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${visits == null || visits.isEmpty()}">
                <td colspan="6" style="text-align: center;">No visits found.</td>
            </tr>
            <tr th:each="visit : ${visits}">
                <td th:text="${visit.id}">ID</td>
                <td th:text="${visit.client?.firstName + ' ' + visit.client?.lastName}">Client Name</td>
                <td th:text="${visit.service?.name}">Service</td>
                <td th:text="${visit.shop?.name}">Shop</td>
                <td th:text="${visit.dueDate != null ? #temporals.format(visit.dueDate, 'dd-MM-yyyy HH:mm') : ''}">DueDate</td>
                <td>
                    <a th:href="@{/visits/{id}(id=${visit.id})}" class="btn btn-sm btn-primary">Read</a>
                    <a th:href="@{/visits/update/{id}(id=${visit.id})}" class="btn btn-sm btn-warning">Update</a>
                    <a th:href="@{/visits/delete/{id}(id=${visit.id})}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>

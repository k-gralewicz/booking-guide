<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <meta charset="UTF-8">
    <title>Visits list</title>
</head>
<body>
<div class="container-fluid">
    <div>
        <div th:replace="fragments/navbar::navigation"></div>
        <div>
            <h1>Visits list</h1>
            <div>
                <table class="table">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Client</th>
                        <th>Service</th>
                        <th>Shop</th>
                        <th>Due Date</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="visit : ${visits}">
                        <td th:text="${visit.id}"></td>
                        <td th:text="${visit.client}"></td>
                        <td th:text="${visit.service}"></td>
                        <td th:text="${visit.shop}"></td>
                        <td th:text="${visit.dueDate}"></td>
                        <td>
                            <a th:href="@{visits/{id}(id = ${visit.id})}" class="btn btn-primary">Read</a>
                            <a th:href="@{visits/update/{id}(id = ${visit.id})}" class="btn btn-warning">Update</a>
                            <a th:href="@{visits/delete/{id}(id = ${visit.id})}" class="btn btn-danger">Delete</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>

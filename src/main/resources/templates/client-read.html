<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Client Details</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
    <div>Client details for:</div>
    <div>
        <div>
            <label for="firstName">First Name</label>
            <span id="firstName" th:text="${client.FirstName}">Client First Name:</span>
        </div>
        <div>
            <label for="lastName">Last Name</label>
            <span id="lastName" th:text="${client.lastName}">Last Name:</span>
        </div>
        <div>
            <label for="email">Email</label>
            <span id="email" th:text="${client.email}">Email:</span>
        </div>
        <div>
            <label for="phoneNumber">Phone Number:</label>
            <span id="phoneNumber" th:text="${client.phoneNumber}">Phone Number:</span>
        </div>
        <div>
            <label for="address.street">Address, Street:</label>
            <span id="address.street" th:text="${client.address.street}">Address, Street:</span>
        </div>
        <div>
            <label for="address.flatNumber">Address, Flat number::</label>
            <span id="address.flatNumber" th:text="${client.address.flatNumber}">Address, Flat number::</span>
        </div>
        <div>
            <label for="address.postCode">Address, Post Code:</label>
            <span id="address.postCode" th:text="${client.address.postCode}">Address, Post Code:</span>
        </div>
        <div>
            <label for="address.city">Address, City:</label>
            <span id="address.city" th:text="${client.address.city}">Address, City:</span>
        </div>
        <div>
            <label for="address.country">Address, Country:</label>
            <span id="address.country" th:text="${client.address.country}">Address, Country:</span>
        </div>
    </div>
</div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Client Details</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid p-0">
    <div th:replace="~{fragments/navbar :: navigation}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h3 class="text-center">Client Details for: <span th:text="${client.firstName + ' ' + client.lastName}" class="text-primary">Client Name</span></h3>
                <hr/>

                <div class="mt-4">
                    <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                        <label class="fw-bold">First Name:</label>
                        <span th:text="${client.firstName}">First Name</span>
                    </div>

                    <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                        <label class="fw-bold">Last Name:</label>
                        <span th:text="${client.lastName}">Last Name</span>
                    </div>

                    <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                        <label class="fw-bold">Email:</label>
                        <span th:text="${client.email}">Email</span>
                    </div>

                    <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                        <label class="fw-bold">Phone Number:</label>
                        <span th:text="${client.phoneNumber}">Phone</span>
                    </div>

                    <h5 class="mt-4 text-secondary">Address Information</h5>

                    <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                        <label class="fw-bold">Street & Number:</label>
                        <span th:text="${client.address?.street + ' ' + (client.address?.flatNumber ?: '')}">Street</span>
                    </div>

                    <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                        <label class="fw-bold">Location:</label>
                        <span th:text="${client.address?.postCode + ' ' + client.address?.city}">Postcode City</span>
                    </div>

                    <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                        <label class="fw-bold">Country:</label>
                        <span th:text="${client.address?.country}">Country</span>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <div class="btn-group">
                        <a th:href="@{/clients}" class="btn btn-secondary">Back to List</a>
                        <a th:href="@{/clients/update/{id}(id=${client.id})}" class="btn btn-warning ms-2">Edit Client</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

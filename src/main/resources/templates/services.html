<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Service List</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments/navbar :: navigation}"></div>

    <h1>Service List</h1>

    <div>
        <a th:href="@{/services/create}" class="btn btn-primary mb-3">Create Service</a>
    </div>

    <div>
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Description</th>
                <th>Price</th>
                <th>Duration</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${services == null || services.isEmpty()}">
                <td colspan="6" style="text-align: center;">No services found.</td>
            </tr>

            <tr th:each="service : ${services}">
                <td th:text="${service.id}">ID</td>
                <td th:text="${service.name}">Name</td>
                <td th:text="${service.description}">Description</td>
                <td th:text="${service.price}">Price</td>
                <td th:text="${service.duration + ' ' + service.durationType}">Duration</td>
                <td>
                    <a th:href="@{/services/{id}(id=${service.id})}" class="btn btn-sm btn-primary">Read</a>
                    <a th:href="@{/services/update/{id}(id=${service.id})}" class="btn btn-sm btn-warning">Update</a>
                    <a th:href="@{/services/delete/{id}(id=${service.id})}" class="btn btn-sm btn-danger">Delete</a>
                    <a th:href="@{/visits/create/{serviceId}(serviceId=${service.id})}" class="btn btn-sm btn-success">Book</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

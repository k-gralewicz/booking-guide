<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <meta charset="UTF-8">
    <title>Clients</title>
</head>
<body>
<div class="container-fluid">
    <div th:replace="fragments/navbar :: navigation"></div>
    <h1>Clients List</h1>
    <div>
        <div sec:authorize="hasRole('ROLE_ADMIN')">
            <div class="col">
                <a href="/clients/create" class="btn btn-primary">Create Client</a>
            </div>
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>FIRST NAME</th>
                    <th>LAST NAME</th>
                    <th>EMAIL</th>
                    <th>PHONE NUMBER</th>
                    <th>READ</th>
                    <th>UPDATE</th>
                    <th>DELETE</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(clients)}">
                    <td colspan="6">This list is empty</td>
                </tr>
                <tr th:each="client : ${clients}">
                    <td th:text="${client.id}"></td>
                    <td th:text="${client.firstName}"></td>
                    <td th:text="${client.lastName}"></td>
                    <td th:text="${client.email}"></td>
                    <td th:text="${client.phoneNumber}"></td>
                    <td><a th:href="@{/clients/{id}(id = ${client.id})}">Read</a></td>
                    <td><a th:href="@{/clients/update/{id}(id = ${client.id})}">Update</a></td>
                    <td><a th:href="@{/clients/delete/{id}(id = ${client.id})}">Delete</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clients</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments/navbar :: navigation}"></div>

    <div sec:authorize="hasRole('ROLE_ADMIN')">
        <h1>Clients List</h1>

        <div>
            <a th:href="@{/clients/create}" class="btn btn-primary mb-3">Create Client</a>
        </div>

        <div>
            <table class="table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Phone Number</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${clients == null || clients.isEmpty()}">
                    <td colspan="6" style="text-align: center;">No clients found.</td>
                </tr>
                <tr th:each="client : ${clients}">
                    <td th:text="${client.id}">ID</td>
                    <td th:text="${client.firstName}">First Name</td>
                    <td th:text="${client.lastName}">Last Name</td>
                    <td th:text="${client.email}">Email</td>
                    <td th:text="${client.phoneNumber}">Phone</td>
                    <td>
                        <a th:href="@{/clients/{id}(id=${client.id})}" class="btn btn-sm btn-primary">Read</a>
                        <a th:href="@{/clients/update/{id}(id=${client.id})}" class="btn btn-sm btn-warning">Update</a>
                        <a th:href="@{/clients/delete/{id}(id=${client.id})}" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

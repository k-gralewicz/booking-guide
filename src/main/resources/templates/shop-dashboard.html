<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Shops</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments/navbar::navigation}"></div>

    <div sec:authorize="hasRole('ROLE_ADMIN')">
        <h1>Shop List</h1>

        <div>
            <a th:href="@{/shops/create}" class="btn btn-primary mb-3">Create Shop</a>
        </div>

        <div>
            <table class="table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Description</th>
                    <th>Phone Number</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${shops == null || shops.isEmpty()}">
                    <td colspan="5" style="text-align: center;">No shops found.</td>
                </tr>
                <tr th:each="shop : ${shops}">
                    <td th:text="${shop.id}">ID</td>
                    <td th:text="${shop.name}">Name</td>
                    <td th:text="${shop.description}">Description</td>
                    <td th:text="${shop.phoneNumber}">Phone</td>
                    <td>
                        <a th:href="@{/shops/{id}(id=${shop.id})}" class="btn btn-sm btn-primary">Read</a>
                        <a th:href="@{/shops/update/{id}(id=${shop.id})}" class="btn btn-sm btn-warning">Update</a>
                        <a th:href="@{/shops/delete/{id}(id=${shop.id})}" class="btn btn-sm btn-danger">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

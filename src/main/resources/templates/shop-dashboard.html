<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <meta charset="UTF-8">
    <title>Shops</title>
</head>
<body>
<div class="container-fluid">
    <div>
        <div th:replace="fragments/navbar::navigation"></div>
        <div sec:authorize="hasRole('ROLE_ADMIN')">
            <div class="col">
                <a href="/shops/create" class="btn btn-primary">Create Shop</a>
            </div>
            <table>
                <tr>
                    <th>ID</th>
                    <th>NAME</th>
                    <th>DESCRIPTION</th>
                    <th>PHONE NUMBER</th>
                    <th>READ</th>
                    <th>UPDATE</th>
                    <th>DELETE</th>
                </tr>
                <tr th:if="${#lists.isEmpty(shops)}">
                    <td colspan="6">This list is empty</td>
                </tr>
                <tr th:each="shop : ${shops}">
                    <td th:text="${shop.id}"></td>
                    <td th:text="${shop.name}"></td>
                    <td th:text="${shop.description}"></td>
                    <td th:text="${shop.phoneNumber}"></td>
                    <td><a th:href="@{/shops/{id}(id = ${shop.id})}">Read</a></td>
                    <td><a th:href="@{/shops/update/{id}(id = ${shop.id})}">Update</a></td>
                    <td><a th:href="@{/shops/delete/{id}(id = ${shop.id})}">Delete</a></td>
                    <!--                <td><a th:href="@{/shops/details/{id}(id = ${shop.id})}">Details</a></td>-->
                </tr>
            </table>
        </div>
    </div>
    <!--    <div th:text="${shops}"></div>-->
</div>
</body>
</html>

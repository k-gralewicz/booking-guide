<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Details</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid p-0">
    <div th:replace="~{fragments/navbar :: navigation}"></div>

    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6 border rounded p-4 bg-light shadow-sm">

                <h3 class="text-center mb-4">User Details</h3>
                <hr/>

                <div class="mt-4">
                    <div class="d-flex justify-content-between border-bottom py-2">
                        <span class="fw-bold">Username:</span>
                        <span th:text="${user.username}">Username</span>
                    </div>

                    <div class="d-flex justify-content-between border-bottom py-2">
                        <span class="fw-bold">Email:</span>
                        <span th:text="${user.email}">Email</span>
                    </div>

                    <div class="d-flex justify-content-between border-bottom py-2">
                        <span class="fw-bold">User Type:</span>
                        <span>
                            <span th:each="role, iter : ${user.roles}"
                                  th:text="${role.name} + ${!iter.last ? ', ' : ''}">
                            </span>
                        </span>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <div class="btn-group">
                        <a th:href="@{/users}" class="btn btn-secondary">Back to List</a>
                        <a th:href="@{/users/update/{id}(id=${user.id})}" class="btn btn-warning ms-2">Edit User</a>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

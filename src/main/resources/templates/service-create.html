<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Update Service' : 'Create Service'">Service Form</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments/navbar :: navigation}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 border rounded p-4 bg-light shadow-sm">

                <h3 class="text-center" th:text="${isEdit} ? 'Update Service' : 'Create Service'">Service Form</h3>
                <hr/>

                <form th:action="${isEdit} ? @{/services/update/{id}(id=${service.id})} : @{/services}"
                      method="post"
                      th:object="${service}">

                    <input type="hidden" th:if="${isEdit}" th:field="*{id}"/>

                    <div class="mb-3">
                        <label for="name" class="fw-bold">Name:</label>
                        <input type="text" id="name" th:field="*{name}" class="form-control" th:errorclass="is-invalid" required>
                        <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="invalid-feedback">Name Error</div>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="fw-bold">Description:</label>
                        <input type="text" id="description" th:field="*{description}" class="form-control" th:errorclass="is-invalid">
                        <div th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="invalid-feedback">Description Error</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="price" class="fw-bold">Price (PLN):</label>
                            <input type="number" step="0.01" id="price" th:field="*{price}" class="form-control" th:errorclass="is-invalid" required>
                            <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="invalid-feedback">Price Error</div>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label for="duration" class="fw-bold">Duration Value:</label>
                            <input type="number" id="duration" th:field="*{duration}" class="form-control" th:errorclass="is-invalid" required>
                            <div th:if="${#fields.hasErrors('duration')}" th:errors="*{duration}" class="invalid-feedback">Duration Error</div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="durationType" class="fw-bold">Duration Unit (e.g. Minutes):</label>
                        <select id="durationType" th:field="*{durationType}" class="form-select" th:errorclass="is-invalid" required>
                            <option value="">-- Select Type --</option>
                            <option th:each="type : ${durationTypes}"
                                    th:value="${type}"
                                    th:text="${type}"></option>
                        </select>
                        <div th:if="${#fields.hasErrors('durationType')}" th:errors="*{durationType}" class="invalid-feedback">Duration Type Error</div>
                    </div>

                    <div class="text-center mt-4">
                        <div class="btn-group w-100">
                            <button type="submit" class="btn btn-primary"
                                    th:text="${isEdit} ? 'Update Service' : 'Create Service'">Save</button>
                            <a th:href="@{/services}" class="btn btn-secondary ms-2">Cancel</a>
                        </div>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Update User' : 'Add New User'">User Form</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments/navbar :: navigation}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 border rounded p-4 bg-light shadow-sm">

                <h3 class="text-center" th:text="${isEdit} ? 'Update User' : 'Add New User'">User Form</h3>
                <hr/>

                <form th:action="${isEdit} ? @{/users/update/{id}(id=${user.id})} : @{/users}"
                      th:object="${user}"
                      method="post">

                    <input type="hidden" th:field="*{id}"/>

                    <div class="mb-3">
                        <label for="username" class="fw-bold">Username:</label>
                        <input type="text" id="username" th:field="*{username}" class="form-control" required/>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="fw-bold">Password:</label>
                        <input type="password" id="password" th:field="*{password}" class="form-control"
                               th:placeholder="${isEdit} ? 'Leave blank to keep current' : '' "/>
                        <div th:if="${isEdit}" class="form-text">Fill only if you want to change the password.</div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="fw-bold">Email:</label>
                        <input type="email" id="email" th:field="*{email}" class="form-control" required/>
                    </div>

                    <div class="mb-3">
                        <label for="role" class="fw-bold">Role:</label>
                        <select id="role" th:field="*{roleId}" class="form-control" required>
                            <option value="" disabled selected>Select a role</option>
                            <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}"></option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="shop" class="fw-bold">Shop:</label>
                        <select id="shop" th:field="*{shopId}" class="form-control" required>
                            <option value="" disabled selected>Select a shop</option>
                            <option th:each="shop : ${shops}" th:value="${shop.id}" th:text="${shop.name}"></option>
                        </select>
                    </div>

                    <div class="text-center mt-4">
                        <div class="btn-group w-100">
                            <button type="submit" class="btn btn-primary"
                                    th:text="${isEdit} ? 'Update User' : 'Add User'">Save</button>
                            <a th:href="@{/users}" class="btn btn-secondary ms-2">Cancel</a>
                        </div>
                    </div>
                </form>

                <div class="mt-3 text-center">
                    <span class="text-info" th:text="${createMessage}"></span>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

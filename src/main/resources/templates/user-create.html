<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <meta charset="UTF-8">
    <title th:text="${isEdit} ? 'Update User' : 'Add New User'">Add New User</title>
</head>
<body>
<div class="container-fluid">
    <div>
        <div th:replace="fragments/navbar::navigation"></div>
        <div class="container">
            <h1 th:text="${isEdit} ? 'Update User' : 'Add New User'">Add New User</h1>
            <form th:action="${isEdit} ? @{/users/update/{id}(id=${user.id})} : @{/users}" th:object="${user}"
                  method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" th:field="*{username}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" th:field="*{password}" class="form-control"/>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" th:field="*{email}" class="form-control" required/>
                </div>
                <div class="form-group">
                    <label for="role">Role:</label>
                    <select id="role" name="roleId" th:field="*{roleId}" class="form-control" required>
                        <option th:each="role : ${roles}" th:value="${role.id}" th:text="${role.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="shop">Shop:</label>
                    <select id="shop" name="shopId" th:field="*{shopId}" class="form-control" required>
                        <option th:each="shop : ${shops}" th:value="${shop.id}" th:text="${shop.name}"></option>
                    </select>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Update User' : 'Add User'">Add
                        User
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>

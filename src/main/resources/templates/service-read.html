<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Details</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments/navbar :: navigation}"></div>
        <div>Service details for:</div>
        <div>
            <div>
                <label for="name">Service name:</label>
                <span id="name" th:text="${service.name}">Service Name:</span>
            </div>
            <div>
                <label for="description">Description:</label>
                <span id="description" th:text="${service.description}">Description:</span>
            </div>
            <div>
                <label for="price">Price:</label>
                <span id="price" th:text="${service.price}">Price:</span>
            </div>
            <div>
                <label for="duration">Duration:</label>
                <span id="duration" th:text="${service.duration}">Duration:</span>
            </div>
            <div>
                <label for="durationType">Duration Type</label>
                <span id="durationType" th:text="${service.durationType}">Duration Type:</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>

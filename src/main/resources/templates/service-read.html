<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Service Details</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
    <div th:replace="~{fragments/navbar :: navigation}"></div>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <h3 class="text-center">Service Details</h3>
                <hr/>

                <div class="mt-4">
                    <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                        <label class="fw-bold">Service name:</label>
                        <span th:text="${service.name}">Service Name</span>
                    </div>

                    <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                        <label class="fw-bold">Description:</label>
                        <span th:text="${service.description}">Description</span>
                    </div>

                    <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                        <label class="fw-bold">Price:</label>
                        <span th:text="${service.price + ' PLN'}">Price</span>
                    </div>

                    <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
                        <label class="fw-bold">Duration:</label>
                        <span th:text="${service.duration + ' ' + service.durationType}">Duration</span>
                    </div>
                </div>

                <div class="text-center mt-5">
                    <div class="btn-group">
                        <a th:href="@{/services}" class="btn btn-secondary">Back to List</a>
                        <a th:href="@{/services/update/{id}(id=${service.id})}" class="btn btn-warning ms-2">Edit Service</a>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

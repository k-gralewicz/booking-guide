<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Visit Details</title>
  <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container-fluid">
  <div th:replace="~{fragments/navbar :: navigation}"></div>

  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">

        <h3 class="text-center">Visit Details</h3>
        <hr/>

        <div class="mt-4">
          <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
            <label class="fw-bold">Service name:</label>
            <span th:text="${visit.service?.name}">Service Name</span>
          </div>

          <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
            <label class="fw-bold">Shop name:</label>
            <span th:text="${visit.shop?.name}">Shop Name</span>
          </div>

          <div class="mb-3 d-flex justify-content-between border-bottom pb-2">
            <label class="fw-bold">Due date:</label>
            <span th:text="${visit.dueDate != null ? #temporals.format(visit.dueDate, 'dd-MM-yyyy HH:mm') : 'Date not set'}">Due Date</span>
          </div>
        </div>

        <div class="text-center mt-5">
          <div class="btn-group">
            <a th:href="@{/clients/dashboard}" class="btn btn-secondary">Back to Dashboard</a>
            <a th:href="@{/visits/update/{id}(id=${visit.id})}" class="btn btn-warning ms-2">Edit Visit</a>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

# Parametry po??czenia z baz? danych H2 dla testµw
# Zmieniono nazw? pliku bazy na dedykowan? dla testµw, aby nie blokowa? bazy g?µwnej
spring.datasource.url=jdbc:h2:file:~/booking-guide-test
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Zarz?dzanie schematem bazy danych
# ZMIANA: Zmie? 'create' na 'create-drop' - baza zostanie wyczyszczona po zako?czeniu testµw
spring.jpa.hibernate.ddl-auto=create-drop

# DODATEK: Kluczowa poprawka dla Hibernate 6 zapobiegaj?ca b??dowi "Unique index or primary key violation" przy hibernate_sequences
spring.jpa.properties.hibernate.id.db_structure_naming_strategy=single

# Logowanie zapyta? SQL - przydatne przy testach
spring.jpa.show-sql=true

# Inicjalizacja danymi testowymi (je?li u?ywask plikµw import.sql lub data.sql)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true